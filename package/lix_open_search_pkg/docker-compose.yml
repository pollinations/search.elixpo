# lix-open-search — self-hostable AI search engine
# https://github.com/elixpo/lixSearch
#
# Usage:
#   cp ../.env.example ../.env   # fill in TOKEN, MODEL, HF_TOKEN
#   cd package && docker compose up -d
#   curl http://localhost:9002/api/health
#
# Scale workers:
#   docker compose up -d --scale app=3

services:
  # ── Redis (session cache, semantic cache, URL cache) ────
  redis:
    image: redis:7-alpine
    container_name: lix-redis
    expose:
      - "9530"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --port 9530
      --requirepass ${REDIS_PASSWORD:-changeme_redis_secret}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "9530", "-a", "${REDIS_PASSWORD:-changeme_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lix-network

  # ── ChromaDB (vector store) ─────────────────────────────
  chroma:
    image: chromadb/chroma:1.5.2
    container_name: lix-chroma
    expose:
      - "9001"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma_data
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data:/chroma_data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost',9001)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lix-network

  # ── IPC Service (embeddings + Playwright search agents) ─
  ipc:
    build:
      context: ../..
      dockerfile: package/lix_open_search_pkg/Dockerfile
    container_name: lix-ipc
    environment:
      - APP_MODE=ipc
      - IPC_PORT=9510
      - IPC_AUTHKEY=${IPC_AUTHKEY:-changeme_ipc_secret}
      - HF_TOKEN=${HF_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=9530
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_secret}
      - CHROMA_API_IMPL=http
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_PORT=9001
    expose:
      - "9510"
    volumes:
      - models-data:/app/models
      - chroma-data:/app/data/embeddings
      - logs-data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost',9510)); s.close()\""]
      interval: 20s
      timeout: 10s
      start_period: 90s
      retries: 5
    restart: unless-stopped
    networks:
      - lix-network

  # ── App Workers (Quart API) ─────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: package/lix_open_search_pkg/Dockerfile
    environment:
      - APP_MODE=worker
      - WORKER_PORT=9002
      - WORKERS=${WORKERS:-10}
      - TOKEN=${TOKEN}
      - MODEL=${MODEL:-openai}
      - IMAGE_MODEL=${IMAGE_MODEL:-zimage}
      - VISION_MODEL=${VISION_MODEL:-gemini-fast}
      - HF_TOKEN=${HF_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=9530
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_secret}
      - CHROMA_API_IMPL=http
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_PORT=9001
      - IPC_HOST=ipc
      - IPC_PORT=9510
      - IPC_AUTHKEY=${IPC_AUTHKEY:-changeme_ipc_secret}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:9002}
    ports:
      - "${PUBLISHED_PORT:-9002}:9002"
    volumes:
      - models-data:/app/models:ro
      - chroma-data:/app/data/embeddings
      - cache-data:/app/data/cache
      - conversations-data:/app/data/conversations
      - logs-data:/app/logs
      - tmp-cache:/app/tmp/cache
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ipc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/api/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      replicas: ${REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - lix-network

volumes:
  redis-data:
  chroma-data:
  models-data:
  cache-data:
  conversations-data:
  logs-data:
  tmp-cache:

networks:
  lix-network:
    driver: bridge
